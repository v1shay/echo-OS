services:
  agent-core:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8788:8788"
    environment:
      JARVIS_AGENT_CORE_BIND: 0.0.0.0:8788
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  scenario-runner:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["/usr/local/bin/scenario_runner"]
    profiles: ["test"]

  browser-sidecar:
    image: node:20-bookworm-slim
    working_dir: /app/browser_sidecar
    volumes:
      - ./browser_sidecar:/app/browser_sidecar
    command: ["sh", "-lc", "npm ci && node server.mjs"]
    profiles: ["sidecar"]
